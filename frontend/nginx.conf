# Nginx config — frontend PromoVideo
# - Serve estáticos com cache agressivo
# - SPA fallback: rota desconhecida → /index.html
# - Proxy reverso:
#     /api/*     → backend Node em :4020 (videos-api)
#     /uploads/* → backend (imagens enviadas pelos users)
#     /out/*     → backend (vídeos MP4 renderizados pelo Remotion)
#
# "videos-api" é o nome do serviço no docker-compose.yml.

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compressão
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  # Segurança básica
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Assets do Vite (hash no nome) → cache 1 ano
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # /api → backend Node do PromoVideo (4020)
  # Vídeos grandes podem demorar pra renderizar — timeout estendido (5min).
  location /api/ {
    proxy_pass http://videos-api:4020/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Uploads de imagem (limite generoso por produto)
    client_max_body_size 25m;
    # Render de vídeo pode demorar — timeout 5min (default nginx é 60s)
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # /uploads → imagens enviadas pelos users
  location /uploads/ {
    proxy_pass http://videos-api:4020/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
  }

  # /out → vídeos MP4 renderizados (Remotion output)
  # Sem cache no nginx (arquivo grande, cache do browser já basta)
  location /out/ {
    proxy_pass http://videos-api:4020/out/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    # Vídeos grandes — sem buffer (stream direto pro cliente)
    proxy_buffering off;
    proxy_read_timeout 300s;
  }

  # SPA fallback — toda rota desconhecida volta pro index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
}
